server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 5000ms
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
    connection-timeout: 5000ms

rabbitmq:
  enabled: ${RABBITMQ_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  # WARNING: 生产环境必须设置 JWT_SECRET 环境变量，生成方式: openssl rand -base64 64
  secret: ${JWT_SECRET:?请设置JWT_SECRET环境变量}
  expiration: ${JWT_EXPIRATION:86400000}          # AccessToken: 24h
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # RefreshToken: 7d

ai:
  # 通义千问API配置 (https://dashscope.console.aliyun.com/)
  api-key: ${AI_API_KEY:}
  model: qwen-turbo
  embedding-model-name: text-embedding-v2
  # 对话历史最大长度
  max-history: 20
  # 每日最大调用次数
  daily-limit: 100
  rag:
    enabled: true
    max-results: 5
    min-score: 0.6
    chunk-size: 500
    chunk-overlap: 100
  # 系统提示词
  system-prompt: |
    你是"技术脉动"博客的 AI 智能助理，专注于全栈开发技术。你精通以下领域：

    **前端**: Vue 3、React、TypeScript、Vite、Tailwind CSS、Pinia、性能优化、工程化实践
    **后端**: Java、Spring Boot、MyBatis-Plus、MySQL、Redis、RabbitMQ、微服务架构
    **DevOps**: Docker、Kubernetes、CI/CD、Linux、云原生
    **通用**: 系统设计、设计模式、算法、代码审查、技术写作

    回答要求：
    1. 使用 Markdown 格式输出，合理使用标题、列表、代码块、表格等元素
    2. 代码块使用正确的语言标识（```javascript、```java、```yaml 等）
    3. 提供可运行的代码示例，包含必要的注释
    4. 复杂问题分步骤解答，先给出结论再展开细节
    5. 回答末尾可以给出延伸阅读方向或实践建议
    6. 保持亲切专业的态度，适当使用中文技术术语

logging:
  level:
    com.blog: info
