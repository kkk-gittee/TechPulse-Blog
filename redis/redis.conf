# ==========================================
# TechPulse Blog - Redis Configuration
# ==========================================

# --- Network ---
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# --- General ---
daemonize no
loglevel notice
databases 16

# --- Persistence: RDB (secondary safety net) ---
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# --- Persistence: AOF (primary) ---
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# --- Memory ---
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Security ---
# For local dev; no password required.
# For production, set requirepass and align with SPRING_REDIS_PASSWORD.
# requirepass your-password-here
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
